[project]
name = "metrics-workbench"
version = "0.1.0"
description = "Metrics Workbench — the capstone: heavy Python interop (pandas / statsmodels / pyod)"
kind = "web-app"
entry-point = "main.jac"

# The load-bearing Python ecosystem — imported into api.jac via analytics.py.
# Numeric heavy-lifting JS has no answer for: dataframes, isolation-forest
# anomalies (pyod), SARIMAX forecasts.
[dependencies]
pandas = "~=3.0"
numpy = "~=2.5"
statsmodels = "~=0.14"
pyod = "~=3.6"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
recharts = "latest"
lucide-react = "latest"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[serve]
base_route_app = "app"

[plugins.client]

[plugins.byllm.model]
default_model = "claude-haiku-4-5-20251001"
